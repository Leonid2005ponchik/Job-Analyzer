<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Анализ вакансий{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }
        
        .navbar {
            background: rgba(20, 20, 30, 0.95) !important;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }
        
        .navbar-brand {
            font-weight: 600;
            color: #ffffff !important;
        }
        
        .nav-link {
            color: #b8b8d0 !important;
            transition: color 0.2s;
        }
        
        .nav-link:hover {
            color: #ffffff !important;
        }
        
        .footer {
            background: rgba(20, 20, 30, 0.8) !important;
            backdrop-filter: blur(8px);
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            color: #8b8ba5;
        }
        
        .footer p {
            margin-bottom: 0;
            color: #8b8ba5;
        }
        
        main {
            min-height: calc(100vh - 140px);
        }
        
        .container {
            max-width: 1400px;
        }
        
        /* Стили для карточек */
        .glass-card {
            background: rgba(25, 25, 35, 0.92);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            transition: all 0.2s ease;
        }
        
        .glass-card:hover {
            border-color: rgba(255, 255, 255, 0.15);
        }
        
        .card-header {
            background: rgba(20, 20, 30, 0.8);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px 20px 0 0 !important;
            padding: 1rem 1.25rem;
        }
        
        .card-header h5 {
            color: #ffffff;
            margin-bottom: 0;
        }
        
        .card-body {
            background: transparent;
            padding: 1.25rem;
        }
        
        .text-muted-light {
            color: #8b8ba5 !important;
        }
        
        .border-bottom-light {
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }
        
        .badge-light-custom {
            background: rgba(50, 50, 70, 0.6);
            color: #b8b8d0;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 4px 10px;
            font-weight: 400;
            font-size: 0.75rem;
            border-radius: 20px;
        }
        
        .btn-outline-light-custom {
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #b8b8d0;
            background: transparent;
            border-radius: 30px;
            padding: 0.25rem 1rem;
            font-size: 0.8rem;
            transition: all 0.2s;
        }
        
        .btn-outline-light-custom:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            border-color: rgba(255, 255, 255, 0.3);
        }
        
        .form-control-dark {
            background: rgba(20, 20, 30, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
            border-radius: 12px;
            padding: 0.5rem 1rem;
            font-size: 0.9rem;
        }
        
        .form-control-dark:focus {
            background: rgba(20, 20, 30, 0.9);
            border-color: #6c5ce7;
            color: #ffffff;
            box-shadow: 0 0 0 0.2rem rgba(108, 92, 231, 0.2);
            outline: none;
        }
        
        .form-label-custom {
            color: #b8b8d0;
            font-size: 0.8rem;
            font-weight: 500;
            margin-bottom: 0.3rem;
        }
        
        .link-light {
            color: #c8c8e0;
            text-decoration: none;
            transition: color 0.2s;
        }
        
        .link-light:hover {
            color: #ffffff;
        }
        
        h2, h5, h6 {
            color: #ffffff;
        }
        
        p, li, small {
            color: #a8a8c0;
        }
        
        hr {
            border-color: rgba(255, 255, 255, 0.08);
        }
        
        /* Стили для скролла */
        ::-webkit-scrollbar {
            width: 6px;
        }
        
        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 3px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>
    <!-- Навигация -->
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="/">JOB аналитика</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/">Главная</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/ml">ML предсказание</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/vacancies">Актуальные вакансии</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Основной контент -->
    <main>
        {% block content %}{% endblock %}
    </main>

    <!-- Подвал -->
    <footer class="footer text-center py-3 mt-5">
        <div class="container">
            <p class="mb-0">Проект по анализу вакансий | 2026</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
